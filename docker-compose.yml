services:
  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: sentinel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: sentinel-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  ai-service:
    build:
      context: ./ai-service
    container_name: sentinel-ai
    ports:
      - "8090:8090"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PYDANTIC_AI_MODEL: ${PYDANTIC_AI_MODEL:-openai:gpt-4o-mini}
      BACKEND_INTERNAL_API_URL: http://backend-springboot:8080
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-springboot:
    build:
      context: ./backend-springboot
    container_name: sentinel-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sentinel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3000000}
      WHOIS_API_KEY: ${WHOIS_API_KEY:-}
      WHOIS_API_URL: ${WHOIS_API_URL:-https://www.whoisxmlapi.com/whoisserver/WhoisService}
      GO_PROBE_URL: http://monitor-worker-go:8081/
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:8090
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: sentinel-spring
      MONITOR_LIFECYCLE_TOPIC: sentinel.monitor.lifecycle
      MONITOR_CHECKS_TOPIC: sentinel.monitor.checks
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@sentinel.local}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dev-google-client-secret}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  monitor-worker-go:
    build:
      context: ./monitor-worker-go
    container_name: sentinel-go-worker
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: sentinel-go-probe
      MONITOR_LIFECYCLE_TOPIC: sentinel.monitor.lifecycle
      MONITOR_CHECKS_TOPIC: sentinel.monitor.checks
      PROBE_ID: ${PROBE_ID:-local-india-1}
      SPRINGBOOT_URL: http://backend-springboot:8080/api/private/update
    depends_on:
      kafka:
        condition: service_healthy
      backend-springboot:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
    container_name: sentinel-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
    depends_on:
      backend-springboot:
        condition: service_healthy

volumes:
  postgres-data:
